run:
  timeout: 5m

output:
  formats:
    - format: colored-line-number
  sort-results: true

linters:
  enable:
    - bodyclose
    - durationcheck
    - errcheck
    - copyloopvar
    - govet
    - nilerr
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - typecheck
    - errname
    - gofumpt
    - goimports
    - goconst
    - gocritic
    - gosimple
    - misspell
    - nakedret
    - prealloc
    - predeclared
    - revive
    - stylecheck
    - unconvert
    - unparam
    - unused
    - whitespace
    - gosec
    - ineffassign
    - cyclop
    - gocognit
    - nestif
    - usetesting
    - tparallel

linters-settings:
  cyclop:
    max-complexity: 15
  gocognit:
    min-complexity: 20
  goconst:
    min-len: 3
    min-occurrences: 3
  errcheck:
    check-type-assertions: true
    check-blank: true
  gofumpt:
    extra-rules: true
  govet:
    enable-all: true
  nakedret:
    max-func-lines: 10
  nestif:
    min-complexity: 5

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-rules:
    - path: _test\.go
      linters:
        - goconst
        - gocritic
        - errcheck
        - gosec
