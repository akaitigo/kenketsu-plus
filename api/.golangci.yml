version: "2"

run:
  timeout: 5m

output:
  formats:
    text:
      print-linter-name: true

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true

linters:
  enable:
    - bodyclose
    - durationcheck
    - errcheck
    - copyloopvar
    - govet
    - nilerr
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - errname
    - goconst
    - gocritic
    - misspell
    - nakedret
    - prealloc
    - predeclared
    - revive
    - unconvert
    - unparam
    - unused
    - whitespace
    - gosec
    - ineffassign
    - cyclop
    - gocognit
    - nestif
    - usetesting
    - tparallel
  settings:
    cyclop:
      max-complexity: 15
    gocognit:
      min-complexity: 20
    goconst:
      min-len: 3
      min-occurrences: 3
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      enable-all: true
    nakedret:
      max-func-lines: 10
    nestif:
      min-complexity: 5
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - goconst
          - gocritic
          - errcheck
          - gosec
    presets:
      - comments
      - std-error-handling
