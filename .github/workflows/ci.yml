name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx biome check .
      - run: npx tsc --noEmit
      - run: npx vitest run --passWithNoTests
      - run: npm run build

  api:
    name: API (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      # PostgreSQL service for the integration tests, which are skipped when
      # DATABASE_URL is unset (e.g. a plain local `go test`).
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kenketsu
          POSTGRES_PASSWORD: kenketsu
          POSTGRES_DB: kenketsu_plus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kenketsu -d kenketsu_plus_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://kenketsu:kenketsu@localhost:5432/kenketsu_plus_test?sslmode=disable
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: false
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          working-directory: api
      - run: go test -v -race -count=1 ./...
      - run: go build -trimpath ./...
